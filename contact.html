<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 | AI 스마트 툴즈</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; background-color: #f4f7f6; }
        .container { background: white; padding: 3rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #6c5ce7; border-bottom: 2px solid #6c5ce7; padding-bottom: 0.5rem; }
        p { margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #dfe6e9; border-radius: 0.5rem; box-sizing: border-box; }
        button { background: #6c5ce7; color: white; border: none; padding: 1rem 2rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #5a4bcf; }
        .back-link { display: inline-block; margin-top: 2rem; text-decoration: none; color: #6c5ce7; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>문의하기</h1>
        <p>서비스 이용 중 불편한 점이나 제안 사항, 비즈니스 협업 문의가 있으시면 아래 폼을 통해 연락해 주세요.</p>
        
        <form action="https://formspree.io/f/xzdqzjnl" method="POST">
            <div class="form-group">
                <label for="name">이름/기업명</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit">메시지 보내기</button>
        </form>

        <a href="index.html" class="back-link">← 홈으로 돌아가기</a>
    </div>
</body>
</html>
