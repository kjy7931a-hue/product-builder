<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추천기 (5게임)</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --text-color: #333;
            --label-color: #666;
            --row-bg: #fafafa;
            --row-border: #ddd;
            --button-bg: #4f46e5;
            --button-hover: #4338ca;
            --ball-shadow: rgba(0,0,0,0.08);
            --container-shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --label-color: #bbb;
            --row-bg: #383838;
            --row-border: #444;
            --button-bg: #6366f1;
            --button-hover: #4f46e5;
            --ball-shadow: rgba(0,0,0,0.3);
            --container-shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--container-shadow);
            text-align: center;
            width: 100%;
            max-width: 550px;
            transition: background-color 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            background-color: var(--row-bg);
            color: var(--text-color);
            border: 1px solid var(--row-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 25px;
            font-size: 24px;
        }

        .lotto-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--row-bg);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px dashed var(--row-border);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .game-label {
            font-weight: bold;
            color: var(--label-color);
            font-size: 14px;
            width: 50px;
            text-align: left;
        }

        .ball-container {
            display: flex;
            gap: 10px;
        }

        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #ddd;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 5px var(--ball-shadow);
            animation: grow 0.3s ease-in-out;
            transition: box-shadow 0.3s;
        }

        @keyframes grow {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .ball.color-1 { background-color: #fbc02d; }
        .ball.color-2 { background-color: #1e88e5; }
        .ball.color-3 { background-color: #e53935; }
        .ball.color-4 { background-color: #8e24aa; }
        .ball.color-5 { background-color: #43a047; }

        .main-button {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .main-button:hover { background-color: var(--button-hover); }
        .main-button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 다크 모드</button>
        <h1>🔮 대박 기원! 로또 번호 추천기 (5게임)</h1>
        
        <div id="lottoWrapper" class="lotto-wrapper">
            <!-- 초기 물음표 공들은 JS에서 생성 -->
        </div>

        <button class="main-button" onclick="generateFiveGames()">번호 5줄 한 번에 뽑기</button>

        <div class="contact-section">
            <hr>
            <h3>📩 제품 문의하기</h3>
            <form action="https://formspree.io/f/xzdqzjnl" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="이름" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의하실 내용을 입력해주세요" rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-button">문의 보내기</button>
            </form>
        </div>
    </div>

    <style>
        /* 기존 스타일에 추가 */
        .contact-section {
            margin-top: 40px;
            text-align: left;
        }
        
        .contact-section hr {
            border: 0;
            border-top: 1px solid var(--row-border);
            margin-bottom: 25px;
        }

        .contact-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--row-border);
            border-radius: 8px;
            background-color: var(--row-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--button-bg);
        }

        .submit-button {
            width: 100%;
            padding: 12px;
            background-color: #10b981; /* 초록색 계열로 차별화 */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-button:hover {
            background-color: #059669;
        }
    </style>

    <script>
        // 테마 관련 기능
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btn = document.getElementById('themeBtn');
            btn.innerText = theme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'light';
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        }

        // 초기 테마 설정
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        // 초기 화면 (물음표 공 6개씩 5줄)
        function initDisplay() {
            const lottoWrapper = document.getElementById('lottoWrapper');
            const labels = ['A', 'B', 'C', 'D', 'E'];
            labels.forEach(label => {
                const row = document.createElement('div');
                row.classList.add('game-row');
                row.innerHTML = `
                    <div class="game-label">${label} 확인</div>
                    <div class="ball-container">
                        <div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
                        <div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
                    </div>
                `;
                lottoWrapper.appendChild(row);
            });
        }
        initDisplay();

        // 번호 생성 로직
        function makeOneGame() {
            const numbers = [];
            while (numbers.length < 6) {
                const randomNum = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(randomNum)) {
                    numbers.push(randomNum);
                }
            }
            return numbers.sort((a, b) => a - b);
        }

        function generateFiveGames() {
            const lottoWrapper = document.getElementById('lottoWrapper');
            lottoWrapper.innerHTML = '';

            const alphabet = ['A', 'B', 'C', 'D', 'E'];

            for (let i = 0; i < 5; i++) {
                const gameNumbers = makeOneGame();
                const row = document.createElement('div');
                row.classList.add('game-row');

                const label = document.createElement('div');
                label.classList.add('game-label');
                label.innerText = alphabet[i] + ' 자동';
                row.appendChild(label);

                const ballContainer = document.createElement('div');
                ballContainer.classList.add('ball-container');

                gameNumbers.forEach(num => {
                    const ball = document.createElement('div');
                    ball.classList.add('ball');
                    ball.innerText = num;

                    if (num <= 10) ball.classList.add('color-1');
                    else if (num <= 20) ball.classList.add('color-2');
                    else if (num <= 30) ball.classList.add('color-3');
                    else if (num <= 40) ball.classList.add('color-4');
                    else ball.classList.add('color-5');

                    ballContainer.appendChild(ball);
                });

                row.appendChild(ballContainer);
                lottoWrapper.appendChild(row);
            }
        }
    </script>


</body>
</html>
