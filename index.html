<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 로또 & 동물상 테스트</title>
    <!-- TensorFlow.js 및 Teachable Machine 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --text-color: #333;
            --label-color: #666;
            --row-bg: #fafafa;
            --row-border: #ddd;
            --button-bg: #4f46e5;
            --button-hover: #4338ca;
            --ball-shadow: rgba(0,0,0,0.08);
            --container-shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --label-color: #bbb;
            --row-bg: #383838;
            --row-border: #444;
            --button-bg: #6366f1;
            --button-hover: #4f46e5;
            --ball-shadow: rgba(0,0,0,0.3);
            --container-shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px var(--container-shadow);
            text-align: center;
            width: 100%;
            max-width: 550px;
            transition: background-color 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            background-color: var(--row-bg);
            color: var(--text-color);
            border: 1px solid var(--row-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* 탭 스타일 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            margin-top: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: 1px solid var(--row-border);
            border-radius: 8px;
            background-color: var(--row-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: var(--button-bg);
            color: white;
            border-color: var(--button-bg);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* 기존 로또 스타일 */
        .lotto-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--row-bg);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px dashed var(--row-border);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .game-label {
            font-weight: bold;
            color: var(--label-color);
            font-size: 14px;
            width: 50px;
            text-align: left;
        }

        .ball-container {
            display: flex;
            gap: 10px;
        }

        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #ddd;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 5px var(--ball-shadow);
            animation: grow 0.3s ease-in-out;
            transition: box-shadow 0.3s;
        }

        @keyframes grow {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .ball.color-1 { background-color: #fbc02d; }
        .ball.color-2 { background-color: #1e88e5; }
        .ball.color-3 { background-color: #e53935; }
        .ball.color-4 { background-color: #8e24aa; }
        .ball.color-5 { background-color: #43a047; }

        .main-button {
            background-color: var(--button-bg);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .main-button:hover { background-color: var(--button-hover); }
        .main-button:active { transform: scale(0.98); }

        /* 동물상 테스트 스타일 */
        .upload-area {
            border: 2px dashed var(--row-border);
            border-radius: 15px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background-color: var(--row-bg);
        }

        .upload-area:hover {
            border-color: var(--button-bg);
        }

        #preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .result-container {
            margin-top: 20px;
            display: none;
        }

        .result-bar {
            height: 25px;
            background-color: #eee;
            border-radius: 12.5px;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.5s ease-out;
        }

        .bar-fill.dog { background-color: #fbc02d; }
        .bar-fill.cat { background-color: #1e88e5; }

        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 12px;
            line-height: 25px;
            font-weight: bold;
            color: #333;
        }

        /* 하단 섹션들 */
        .contact-section, .comment-section {
            margin-top: 40px;
            text-align: left;
        }
        
        .contact-section hr, .comment-section hr {
            border: 0;
            border-top: 1px solid var(--row-border);
            margin-bottom: 25px;
        }

        .contact-section h3, .comment-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text-color);
            text-align: center;
        }

        .form-group { margin-bottom: 15px; }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--row-border);
            border-radius: 8px;
            background-color: var(--row-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }

        .submit-button {
            width: 100%;
            padding: 12px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 다크 모드</button>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('lotto')">로또 추천</button>
            <button class="tab-btn" onclick="showTab('animal')">동물상 테스트</button>
        </div>

        <!-- 로또 추천 섹션 -->
        <div id="lotto-section" class="content-section active">
            <h1>🔮 로또 번호 추천기</h1>
            <div id="lottoWrapper" class="lotto-wrapper"></div>
            <button class="main-button" onclick="generateFiveGames()">번호 5줄 한 번에 뽑기</button>
        </div>

        <!-- 동물상 테스트 섹션 -->
        <div id="animal-section" class="content-section">
            <h1>🐶 동물상 테스트 🐱</h1>
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <p id="upload-text">📸 사진을 업로드하거나 드래그하세요</p>
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleImageUpload(event)">
                <img id="preview-image" alt="미리보기">
            </div>
            
            <div id="loading" style="display: none; margin-bottom: 20px;">AI 분석 중...</div>

            <div id="result-container" class="result-container">
                <h2 id="result-title">분석 결과</h2>
                <div class="result-item">
                    <span>🐶 강아지상</span>
                    <div class="result-bar">
                        <div id="dog-fill" class="bar-fill dog" style="width: 0%"></div>
                        <span id="dog-percent" class="bar-text">0%</span>
                    </div>
                </div>
                <div class="result-item">
                    <span>🐱 고양이상</span>
                    <div class="result-bar">
                        <div id="cat-fill" class="bar-fill cat" style="width: 0%"></div>
                        <span id="cat-percent" class="bar-text">0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 문의 폼 섹션 -->
        <div class="contact-section">
            <hr>
            <h3>📩 제품 문의하기</h3>
            <form action="https://formspree.io/f/xzdqzjnl" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="이름" required>
                </div>
                <div class="form-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의하실 내용을 입력해주세요" rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-button">문의 보내기</button>
            </form>
        </div>

        <!-- 댓글 섹션 -->
        <div class="comment-section">
            <hr>
            <h3>💬 댓글 남기기</h3>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://product-builder-p8lvcihwvu.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </div>

    <script>
        /* 1. 공통 기능 (테마/탭) */
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const btn = document.getElementById('themeBtn');
            btn.innerText = theme === 'dark' ? '☀️ 라이트 모드' : '🌙 다크 모드';
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'light';
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            
            document.querySelector(`.tab-btn[onclick*="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}-section`).classList.add('active');
        }

        /* 2. 로또 기능 */
        function initLottoDisplay() {
            const lottoWrapper = document.getElementById('lottoWrapper');
            const labels = ['A', 'B', 'C', 'D', 'E'];
            lottoWrapper.innerHTML = '';
            labels.forEach(label => {
                const row = document.createElement('div');
                row.classList.add('game-row');
                row.innerHTML = `
                    <div class="game-label">${label} 확인</div>
                    <div class="ball-container">
                        <div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
                        <div class="ball">?</div><div class="ball">?</div><div class="ball">?</div>
                    </div>
                `;
                lottoWrapper.appendChild(row);
            });
        }

        function makeOneGame() {
            const numbers = [];
            while (numbers.length < 6) {
                const randomNum = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(randomNum)) numbers.push(randomNum);
            }
            return numbers.sort((a, b) => a - b);
        }

        function generateFiveGames() {
            const lottoWrapper = document.getElementById('lottoWrapper');
            lottoWrapper.innerHTML = '';
            const alphabet = ['A', 'B', 'C', 'D', 'E'];
            for (let i = 0; i < 5; i++) {
                const gameNumbers = makeOneGame();
                const row = document.createElement('div');
                row.classList.add('game-row');
                const label = document.createElement('div');
                label.classList.add('game-label');
                label.innerText = alphabet[i] + ' 자동';
                row.appendChild(label);
                const ballContainer = document.createElement('div');
                ballContainer.classList.add('ball-container');
                gameNumbers.forEach(num => {
                    const ball = document.createElement('div');
                    ball.classList.add('ball');
                    ball.innerText = num;
                    if (num <= 10) ball.classList.add('color-1');
                    else if (num <= 20) ball.classList.add('color-2');
                    else if (num <= 30) ball.classList.add('color-3');
                    else if (num <= 40) ball.classList.add('color-4');
                    else ball.classList.add('color-5');
                    ballContainer.appendChild(ball);
                });
                row.appendChild(ballContainer);
                lottoWrapper.appendChild(row);
            }
        }

        /* 3. 동물상 테스트 AI 기능 */
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/M26t_mTBp/";
        let model, maxPredictions;

        async function initAI() {
            const modelURL = MODEL_URL + "model.json";
            const metadataURL = MODEL_URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const img = document.getElementById('preview-image');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('upload-text').style.display = 'none';
                
                await predict();
            }
            reader.readAsDataURL(file);
        }

        async function predict() {
            if (!model) {
                document.getElementById('loading').style.display = 'block';
                await initAI();
                document.getElementById('loading').style.display = 'none';
            }
            
            const img = document.getElementById('preview-image');
            const prediction = await model.predict(img);
            
            document.getElementById('result-container').style.display = 'block';
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className; // "강아지" or "고양이"
                const probability = (prediction[i].probability * 100).toFixed(1);
                
                if (className === "강아지") {
                    document.getElementById('dog-fill').style.width = probability + "%";
                    document.getElementById('dog-percent').innerText = probability + "%";
                } else if (className === "고양이") {
                    document.getElementById('cat-fill').style.width = probability + "%";
                    document.getElementById('cat-percent').innerText = probability + "%";
                }
            }
        }

        // 초기화 실행
        setTheme(localStorage.getItem('theme') || 'light');
        initLottoDisplay();
    </script>
</body>
</html>
